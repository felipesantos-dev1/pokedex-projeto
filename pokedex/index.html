<!DOCTYPE html> <!-- tipo do documento -->
<html lang="pt-BR"> <!-- idioma -->
<head> <!-- configurações da pagina -->
    <meta charset="UTF-8"> <!-- permite usar simboloes e caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikadex</title> <!-- nome que fica na aba -->
    <link rel="icon" type="image/png" href="pokebola.png"> <!-- icone do site -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="home.css"> <!-- conecta o css no html -->

</head> <!-- fecha as configurações -->

<body> <!-- conteudo visual da pagina -->
    
    <div class=" fundo">
        <div class="quadrado_1">
        <div class="header-title">
            <img src="pokebola.png" alt="Pokébola" class="title-icon">
            <h1>Bem vindo a sua nova Pokédex</h1>
        </div>
        <h2>Pesquise pokémon favorito</h2>

                <div class="search-box">
                    <div class="input-container">
                        <input type="text" id="pokemonInput" placeholder="Digite nome" autocomplete="off">
                        <div id="suggestionsList"></div>
                    </div>
                    <button id="searchBtn">Buscar</button>
                </div>

                <div id="resultCard" class="card hidden">
                    <div class="card-header">
                        <span id="pokedexId" class="pokedex-id"></span>
                        <h2 id="pokemonName"></h2>
                    </div>

                    <div class="image-container">
                        <img id="pokemonImage" src="" alt="Sprite do Pokémon">
                    </div>

                    <div id="pokemonTypes" class="types-container">
                    </div>
                </div>
                
                <div class="img_ditto"> 
                   <img src="ditto.png"> 
                </div>

                <div class="img_charizard">
                    <img src="charizard.png">
                </div>
                      
                <div class="img_gengar">
                    <img src="gengar.png">
                </div>
                


                <div class="img_diglet">
                    <img src="taylormon.png">
                </div>


        </div> <!-- quadrado_1 -->

    </div> <!-- fundo -->




    <script src="api.js"></script>
</body>  <!-- fecha a parte viusal -->


</html> <!-- fecha o documento -->

<!-- /p = paragrafo -->
<!-- div = serve como um grupo que vai ter varios elementos -->
